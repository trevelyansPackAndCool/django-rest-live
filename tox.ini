[tox]
isolated_build = True
envlist =
;    lint,
    py3{8,9,10,11,12}-django{42,50}-channels{4}-drf3{14,15}

[testenv]
commands =
    pytest --cov=rest_live --cov-append {posargs}
setenv =
    DJANGO_SETTINGS_MODULE = tests.settings
    PYTHONPATH = {toxinidir}
;    PYTHONWARNINGS = all
deps =
    django42: Django>=4.2,<5.0
    django50: Django>=5.0,<5.1
    channels4: channels>=4.0,<5.0
    drf314: djangorestframework>=3.14,<3.15
    drf315: djangorestframework>=3.15,<3.16
    coverage
    pytest
    pytest-cov
    pytest-django
    pytest-asyncio
    pytest-mock
    djangorestframework
    djangorestframework-camel-case

[testenv:lint]
skip_install = True
commands =
    flake8
    isort . --check
    black --check .
deps =
    black
    flake8
    flake8-absolute-import
    flake8-isort
    flake8-quotes

[flake8]
max-line-length = 88
exclude = docs/, .tox/, build/
inline-quotes = double

[isort]
default_section = THIRDPARTY
known_first_party = rest_live
line_length = 88
lines_after_imports = 2
multi_line_output = 3
include_trailing_comma = True
use_parentheses = True

[coverage:run]
source = rest_live

[pytest]
django_find_project = false

[gh-actions]
python =
    3.8: py38, lint
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312
